<style>
  :root{

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{

  }
  .display{ font-family:"Zen Kaku Gothic New", sans-serif; font-weight:900; }
  #app{ max-width:480px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative; }

  .progress-fill{
    height:100%; border-radius:999px; background: linear-gradient(90deg, var(--accent), var(--accent-deep));
    transition: width 0.35s ease;
  }
  .progress-meta{
    display:flex; justify-content:space-between; margin-top:6px;
    font-size:11.5px; color:var(--ink-soft);
  }

  h2{ font-family:"Zen Kaku Gothic New",sans-serif; font-weight:700; font-size:20px; line-height:1.55; color:var(--ink); margin:0 0 12px; }

  .eyebrow{ font-size:12px; letter-spacing:0.12em; color:var(--accent-deep); font-weight:700; margin-bottom:8px; display:block; }

  .pulse{
    width:120px; height:120px; border-radius:50%;
    background: radial-gradient(circle at 32% 28%, #ffffff, var(--accent-soft) 55%, var(--accent) 130%);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.7) inset, var(--shadow);
    animation: pulse 3.6s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ transform:scale(0.9); } 50%{ transform:scale(1.05); } }
  @media (prefers-reduced-motion: reduce){ .pulse{ animation:none; } }

  .card{
    background:var(--bg); border:1px solid var(--line); border-radius:var(--radius);
    padding:20px 20px; box-shadow: 0 6px 18px rgba(22,35,42,0.05);
    margin-bottom:16px;
  }
  .note-box{
    font-size:13px; color:var(--ink-soft); background:var(--bg-soft);
    border-radius:14px; padding:14px 16px; line-height:1.75; border:1px dashed var(--accent);

  .danger-box{
    font-size:14px; color:var(--danger); background:var(--danger-soft);

  }

  .badge{ font-size:12.5px; background:var(--accent-soft); color:var(--accent-deep); padding:6px 12px; border-radius:999px; font-weight:500; }

  .opt-list{ display:flex; flex-direction:column; gap:12px; margin-top:16px; }
  .opt{
    text-align:left; background:var(--bg); border:1.5px solid var(--line); border-radius:16px;
    padding:16px 18px; font-size:15.5px; color:var(--ink); cursor:pointer; font-family:inherit;
    display:flex; align-items:center; gap:12px;
    transition: border-color 0.15s, background 0.15s, transform 0.12s;

  .opt:hover{ border-color:var(--accent); transform:translateY(-1px); }
  .opt.selected{ border-color:var(--accent); background:var(--accent-soft); font-weight:700; }
  .opt .mark{
    flex-shrink:0; width:22px; height:22px; border-radius:7px; border:1.5px solid var(--line);

  .opt.selected .mark{ background:var(--accent); border-color:var(--accent); }
  .opt.selected .mark::after{ content:"✓"; }

    display:block; width:100%; text-align:center; padding:18px 22px; border-radius:999px;
    font-size:16.5px; font-weight:700; border:none; cursor:pointer; font-family:inherit;

  .btn-ghost{ background:transparent; color:var(--accent-deep); border:1.5px solid var(--accent); }
  .btn-line{ background:#06C755; color:#fff; box-shadow:0 12px 26px rgba(6,199,85,0.3); }
  .btn-text{ background:none; border:none; color:var(--accent-deep); font-size:14px; padding:8px; cursor:pointer; font-family:inherit; }

  .footer-bar{
    position:sticky; bottom:0; z-index:20;
    background:linear-gradient(to top, var(--bg) 65%, rgba(255,255,255,0));
    padding:18px 20px 26px; display:flex; flex-direction:column; gap:8px;

  .fade-in{ animation:fadeIn 0.4s ease; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  /* body map */
  .bodymap-toggle{ display:flex; gap:8px; margin-bottom:14px; }
  .bodymap-toggle button{
    flex:1; padding:10px; border-radius:12px; border:1.5px solid var(--line); background:#fff;
    font-family:inherit; font-size:14px; font-weight:700; color:var(--ink-soft); cursor:pointer;

  .bodymap-toggle button.active{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .bodymap-svg-wrap{ display:flex; justify-content:center; margin:6px 0 10px; }
  .bm-dot{ cursor:pointer; }
  .bm-dot circle{ fill:#fff; stroke:var(--accent); stroke-width:2; transition:fill 0.15s; }
  .bm-dot text{ font-size:9px; fill:var(--accent-deep); font-family:"Noto Sans JP",sans-serif; text-anchor:middle; pointer-events:none; }
  .bm-dot.selected circle{ fill:var(--accent); }
  .bm-dot.selected text{ fill:#fff; }
  .bm-chip-list{ display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
  .bm-chip{
    font-size:13px; padding:8px 12px; border-radius:999px; border:1.5px solid var(--line);

  .bm-chip.selected{ background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700; }

  /* slider */
  .slider-wrap{ margin-top:22px; }
  .slider-value{ text-align:center; font-family:"Zen Kaku Gothic New",sans-serif; font-weight:900; font-size:44px; color:var(--accent-deep); margin-bottom:6px; }
  .slider-value span{ font-size:16px; font-weight:500; color:var(--ink-soft); }
  input[type=range]{ width:100%; accent-color:var(--accent); }

  .result-hero{ text-align:center; padding:8px 0 4px; }
  .result-hero .tag{ font-family:"Zen Kaku Gothic New",sans-serif; font-weight:900; font-size:34px; color:var(--accent); line-height:1; margin-bottom:8px; }

  details summary{ cursor:pointer; font-size:14px; color:var(--accent-deep); font-weight:700; padding:8px 2px; list-style:none; }
  details summary::-webkit-details-marker{ display:none; }
  details summary::before{ content:"＋ "; }
  details[open] summary::before{ content:"－ "; }

  .kv-row{ display:flex; gap:12px; margin:10px 0; align-items:flex-start; }
  .kv-row .num{

  .kv-row .txt{ font-size:14.5px; color:var(--ink); line-height:1.75; padding-top:1px; }

  .cta-block{
    text-align:center; padding:24px 20px; border-radius:var(--radius);

  .cta-block .lead{ font-family:"Zen Kaku Gothic New",sans-serif; font-weight:900; font-size:19px; line-height:1.7; color:#fff; margin-bottom:10px; }
</style>

    future:"身体全体のつながりを意識できるようになると、日常の動きや趣味を、これからも安心して続けやすくなっていく可能性があります。",
  },
};

/* ---------------------------------------------------------
   状態
--------------------------------------------------------- */
let state = {
  screen: "start",       // start | safety | quiz | loading | result | guidance
  qIndex: 0,
  safetySelected: [],
  answers: {},            // questionId -> selected label(s)
  bodyView: "front",
  bodyParts: [],           // selected part ids
  selfScore: 65,
  scores: { UG1:0, UG2:0, UG3:0, UG4:0, UG5:0, UG6:0 },
};

function resetAll(){
  state = { screen:"start", qIndex:0, safetySelected:[], answers:{}, bodyView:"front", bodyParts:[], selfScore:65,
    scores:{UG1:0,UG2:0,UG3:0,UG4:0,UG5:0,UG6:0} };
  render();
}

function addScore(scoreObj){
  for(const k in scoreObj){ state.scores[k] = (state.scores[k]||0) + scoreObj[k]; }
}

function computeMainType(){
  const order = ["UG1","UG2","UG3","UG4","UG5","UG6"];
  let best="UG6", bestVal=-1;
  for(const k of order){ if(state.scores[k] > bestVal){ bestVal = state.scores[k]; best = k; } }
  return best;
}

/* ---------------------------------------------------------
   描画ヘルパー
--------------------------------------------------------- */
const app = document.getElementById("app");

function estimateSecondsLeft(){
  const total = QUESTIONS.length;
  const remain = total - state.qIndex;
  return Math.max(remain * 12, 10); // 1問あたり約12秒換算
}

function topbarHTML(){
  if(state.screen !== "quiz"){
    return `<div class="topbar"><span class="brand">UG.seitai</span></div>`;
  }
  const total = QUESTIONS.length;
  const pct = Math.round((state.qIndex / total) * 100);
  const secs = estimateSecondsLeft();
  return `
  <div class="topbar">
    <span class="brand">UG.seitai</span>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
    <div class="progress-meta">
      <span>質問 ${state.qIndex+1} / ${total}</span>
      <span>残り約${secs}秒</span>
    </div>
  </div>`;
}

/* ---------------------------------------------------------
   各画面
--------------------------------------------------------- */
function screenStart(){
  return `
  <main class="fade-in">
    <div class="pulse-wrap"><div class="pulse"></div></div>
    <span class="eyebrow">3-MINUTE BODY CHECK</span>
    <h1>3分でわかる<br>身体セルフチェック</h1>
    <p>痛みがある方も、今の身体を知りたい方も。呼吸・姿勢・動きから、あなたの身体で優先して整えたいポイントを確認します。</p>
    <div class="badge-row">
      <span class="badge">約3分</span>
      <span class="badge">全12問</span>
      <span class="badge">無料</span>
      <span class="badge">痛みがなくてもOK</span>
    </div>
    <div class="note-box" style="margin-top:18px;">
      これは医療診断ではありません。今の身体の使い方の傾向を知るためのセルフチェックです。強い症状がある場合は、医療機関へのご相談をおすすめします。
    </div>
  </main>
  <div class="footer-bar">
    <button class="btn btn-primary" onclick="goSafety()">3分セルフチェックを始める</button>
    <p style="text-align:center; font-size:12.5px; color:var(--ink-soft); margin:2px 0 0;">痛み・姿勢・呼吸・スポーツ・ダイエット・将来の予防が気になる方へ</p>
  </div>`;
}

function screenSafety(){
  const opts = SAFETY_ITEMS.map(item=>{
    const sel = state.safetySelected.includes(item);
    return `<button class="opt ${sel?'selected':''}" onclick="toggleSafety('${item}')"><span class="mark"></span>${item}</button>`;
  }).join("");
  return `
  <main class="fade-in">
    <span class="eyebrow">はじめに、安全確認をさせてください</span>
    <h2>現在、次のような症状はありますか？</h2>
    <div class="opt-list">${opts}</div>
  </main>
  <div class="footer-bar">
    <button class="btn btn-primary" ${state.safetySelected.length===0?'disabled style="opacity:0.4;"':''} onclick="submitSafety()">次へ</button>
  </div>`;
}

function screenGuidance(){
  return `
  <main class="fade-in">
    <div class="pulse-wrap"><div class="pulse" style="animation:none; background:radial-gradient(circle at 32% 28%, #fff, var(--danger-soft) 60%, var(--danger) 140%);"></div></div>
    <h2>まずは医療機関へのご相談をおすすめします</h2>
    <div class="danger-box">
      いただいた回答の中に、注意が必要な症状が含まれていました。このセルフチェックは、そのような症状がある場合を想定した内容ではないため、今回はセルフケアのご案内を控えさせていただきます。<br><br>
      症状の内容によっては、早めに医療機関を受診されることをおすすめします。ご心配な場合は、お近くの医療機関や相談窓口にご相談ください。
    </div>
  </main>
  <div class="footer-bar">
    <button class="btn-text" onclick="resetAll()">最初の画面に戻る</button>
  </div>`;
}

function screenQuiz(){
  const q = QUESTIONS[state.qIndex];
  let body = "";

  if(q.type === "single"){
    const selected = state.answers[q.id];
    const opts = q.options.map(o=>{
      const sel = selected === o.label;
      return `<button class="opt ${sel?'selected':''}" onclick="answerSingle('${o.label.replace(/'/g,"\\'")}')"><span class="mark"></span>${o.label}</button>`;
    }).join("");
    body = `
      <h2>${q.title}</h2>
      ${q.desc ? `<p>${q.desc}</p>` : ""}
      <div class="opt-list">${opts}</div>
    `;
  } else if(q.type === "bodymap"){
    body = screenBodyMapInner(q);
  } else if(q.type === "slider"){
    body = `
      <h2>${q.title}</h2>
      <p>${q.desc}</p>
      <div class="slider-wrap">
        <div class="slider-value"><span id="selfScoreLabel">${state.selfScore}</span><span> / 100点</span></div>
        <input type="range" min="0" max="100" step="1" value="${state.selfScore}"
          oninput="document.getElementById('selfScoreLabel').textContent=this.value; state.selfScore=parseInt(this.value);">
      </div>
    `;
  }

  const canNext = questionAnswered(q);

  return `
  <main class="fade-in">
    <span class="eyebrow">セルフチェック</span>
    ${body}
  </main>
  <div class="footer-bar">
    <button class="btn btn-primary" ${canNext?'':'disabled style="opacity:0.4;"'} onclick="nextQuestion()">${state.qIndex===QUESTIONS.length-1 ? '診断する' : '次へ'}</button>
    <button class="back-link btn-text" onclick="prevQuestion()">${state.qIndex===0 ? '安全確認に戻る' : '前の質問に戻る'}</button>
  </div>`;
}

function screenBodyMapInner(q){
  const parts = BODY_PARTS[state.bodyView];
  const dots = parts.map(p=>{
    const sel = state.bodyParts.includes(p.id);
    return `<g class="bm-dot ${sel?'selected':''}" onclick="toggleBodyPart('${p.id}')">
      <circle cx="${p.x}" cy="${p.y}" r="14"></circle>
      <text x="${p.x}" y="${p.y+3}">${p.label.length>2 ? p.label.slice(0,2) : p.label}</text>
    </g>`;
  }).join("");

  const silhouette = `
    <ellipse cx="100" cy="30" rx="20" ry="22" fill="#EAF6F5" stroke="var(--accent)" stroke-width="1.5"/>
    <path d="M70 55 Q100 45 130 55 L138 160 Q100 175 62 160 Z" fill="#EAF6F5" stroke="var(--accent)" stroke-width="1.5"/>
    <rect x="40" y="60" width="20" height="110" rx="10" fill="#EAF6F5" stroke="var(--accent)" stroke-width="1.5"/>
    <rect x="140" y="60" width="20" height="110" rx="10" fill="#EAF6F5" stroke="var(--accent)" stroke-width="1.5"/>
    <path d="M62 160 Q100 180 138 160 L128 260 Q100 270 72 260 Z" fill="#EAF6F5" stroke="var(--accent)" stroke-width="1.5"/>
    <rect x="72" y="255" width="22" height="110" rx="11" fill="#EAF6F5" stroke="var(--accent)" stroke-width="1.5"/>
    <rect x="106" y="255" width="22" height="110" rx="11" fill="#EAF6F5" stroke="var(--accent)" stroke-width="1.5"/>
  `;

  const noPain = state.bodyParts.includes(NO_PAIN_LABEL);
  const chips = `<button class="bm-chip ${noPain?'selected':''}" onclick="toggleNoPain()">${NO_PAIN_LABEL}</button>`;

  return `
    <h2>${q.title}</h2>
    <p>${q.desc}</p>
    <div class="bodymap-toggle">
      <button class="${state.bodyView==='front'?'active':''}" onclick="setBodyView('front')">正面</button>
      <button class="${state.bodyView==='back'?'active':''}" onclick="setBodyView('back')">背面</button>
    </div>
    <div class="bodymap-svg-wrap">
      <svg viewBox="0 0 200 380" width="220" height="418">
        ${silhouette}
        ${dots}
      </svg>
    </div>
    <p style="font-size:12.5px;">選んだ部位：${state.bodyParts.filter(p=>p!==NO_PAIN_LABEL).map(id=>{
      const found = [...BODY_PARTS.front].find(p=>p.id===id);
      return found ? found.label : id;
    }).join("、") || "まだ選択されていません"}（最大3か所）</p>
    <div class="bm-chip-list">${chips}</div>
  `;
}

function screenLoading(){
  const msgs = [
    "呼吸の使い方を確認しています",
    "身体の左右差を整理しています",
    "身体を支える力を確認しています",
    "あなたに合うUGタイプをまとめています",
  ];
  const msg = msgs[Math.floor(Math.random()*msgs.length)];
  return `
  <main class="fade-in" style="text-align:center; padding-top:80px;">
    <div class="pulse-wrap"><div class="pulse"></div></div>
    <p style="margin-top:20px;">${msg}…</p>
  </main>`;
}

function screenResult(){
  const key = computeMainType();
  const t = UG_TYPES[key];
  const goal = state.answers["goal"] || null;

  const goalLine = goal ? `<p style="font-size:13px; color:var(--accent-deep); font-weight:700; margin-top:-4px;">今回の目的：${goal}</p>` : "";
  const scoreLine = `<p style="font-size:13px;">今の身体を自己採点した結果は「${state.selfScore}点」でした。今回の回答は、この点数を踏まえて優先ポイントをまとめています。</p>`;

  return `
  <main class="fade-in">
    <div class="card result-hero">
      <span class="badge">あなたのUGタイプ</span>
      <div class="tag" style="margin-top:8px;">${key}</div>
      <h2 style="margin:6px 0 4px;">${t.name.split("｜")[1]}</h2>
      ${goalLine}
      <p style="font-size:14px;">${t.tagline}</p>
    </div>

    <div class="card">
      <span class="eyebrow">現在の身体の特徴</span>
      ${t.features.map(f=>`<div class="kv-row"><span class="num">・</span><span class="txt">${f}</span></div>`).join("")}
      ${scoreLine}
    </div>

    <div class="card">
      <span class="eyebrow">考えられる身体の傾向</span>
      <p>${t.tendency}</p>
    </div>

    <div class="card">
      <span class="eyebrow">優先して整えるべき3つ</span>
      ${t.priorities.map((p,i)=>`<div class="kv-row"><span class="num">${i+1}</span><span class="txt">${p}</span></div>`).join("")}
      <p style="font-size:12.5px; margin-top:6px;">※ 具体的なやり方は、LINE登録後のセルフケア動画でお伝えします。</p>
    </div>

    <div class="card">
      <span class="eyebrow">身体が整った先の未来</span>
      <p>${t.future}</p>
    </div>

    <div class="cta-block">
      <p class="lead">あなた専用のセルフケア動画（3本）を<br>LINEで無料プレゼントしています</p>
      <p style="font-size:13.5px; line-height:1.8;">登録後、あなたの診断結果「${key}」を選ぶだけで、あなた専用プログラムが始まります。</p>
      <div style="margin-top:14px;">
        <a href="${LINE_URL}" target="_blank" rel="noopener" class="btn btn-line" style="text-decoration:none;">LINEで無料セルフケアを受け取る</a>
      </div>
    </div>

    <div class="note-box" style="margin-top:16px;">
      このセルフチェックは医療診断ではありません。優先して見直したい身体機能の傾向を示すものであり、痛みの原因を断定するものではありません。強い症状が続く場合は、医療機関にご相談ください。
    </div>

    <div style="text-align:center; margin-top:18px;">
      <button class="btn-text" onclick="resetAll()">もう一度セルフチェックする</button>
    </div>
  </main>`;
}

/* ---------------------------------------------------------
   ロジック
--------------------------------------------------------- */
function questionAnswered(q){
  if(q.type === "single") return !!state.answers[q.id];
  if(q.type === "slider") return true;
  if(q.type === "bodymap") return state.bodyParts.length > 0;
  return true;
}

function goSafety(){ state.screen="safety"; render(); }

function toggleSafety(item){
  const idx = state.safetySelected.indexOf(item);
  if(idx>-1){
    state.safetySelected.splice(idx,1);
  } else if(item === SAFETY_NONE){
    state.safetySelected = [SAFETY_NONE];
  } else {
    state.safetySelected = state.safetySelected.filter(x=>x!==SAFETY_NONE);
    state.safetySelected.push(item);
  }
  render();
}

function submitSafety(){
  const flagged = state.safetySelected.length>0 && !state.safetySelected.includes(SAFETY_NONE);
  if(flagged){ state.screen="guidance"; render(); return; }
  state.screen="quiz"; state.qIndex=0; render();
}

function answerSingle(label){
  const q = QUESTIONS[state.qIndex];
  // 前の回答のスコアを取り消してから、新しい回答のスコアを加算する
  const prevLabel = state.answers[q.id];
  if(prevLabel){
    const prevOpt = q.options.find(o=>o.label===prevLabel);
    if(prevOpt){ for(const k in prevOpt.score){ state.scores[k] -= prevOpt.score[k]; } }
  }
  const opt = q.options.find(o=>o.label===label);
  state.answers[q.id] = label;
  if(opt){ addScore(opt.score); }
  render();
}

function setBodyView(view){ state.bodyView = view; render(); }

function toggleBodyPart(id){
  const idx = state.bodyParts.indexOf(id);
  if(idx>-1){
    state.bodyParts.splice(idx,1);
    if(BODY_PART_SCORE[id]){ for(const k in BODY_PART_SCORE[id]){ state.scores[k] -= BODY_PART_SCORE[id][k]; } }
    render(); return;
  }
  const realParts = state.bodyParts.filter(p=>p!==NO_PAIN_LABEL);
  if(realParts.length >= 3){ return; }
  state.bodyParts = state.bodyParts.filter(p=>p!==NO_PAIN_LABEL);
  state.bodyParts.push(id);
  if(BODY_PART_SCORE[id]){ addScore(BODY_PART_SCORE[id]); }
  render();
}

function toggleNoPain(){
  const has = state.bodyParts.includes(NO_PAIN_LABEL);
  if(has){
    state.bodyParts = state.bodyParts.filter(p=>p!==NO_PAIN_LABEL);
  } else {
    state.bodyParts.filter(p=>p!==NO_PAIN_LABEL).forEach(id=>{
      if(BODY_PART_SCORE[id]){ for(const k in BODY_PART_SCORE[id]){ state.scores[k] -= BODY_PART_SCORE[id][k]; } }
    });
    state.bodyParts = [NO_PAIN_LABEL];
    addScore({UG6:2});
  }
  render();
}

function nextQuestion(){
  if(state.qIndex < QUESTIONS.length-1){
    state.qIndex++; render();
  } else {
    state.screen="loading"; render();
    setTimeout(()=>{ state.screen="result"; render(); window.scrollTo(0,0); }, 1600);
  }
}

function prevQuestion(){
  if(state.qIndex===0){ state.screen="safety"; render(); return; }
  state.qIndex--; render();
}

function render(){
  let html = topbarHTML();
  if(state.screen==="start") html += screenStart();
  else if(state.screen==="safety") html += screenSafety();
  else if(state.screen==="guidance") html += screenGuidance();
  else if(state.screen==="quiz") html += screenQuiz();
  else if(state.screen==="loading") html += screenLoading();
  else if(state.screen==="result") html += screenResult();
  app.innerHTML = html;
}

render();
</script>
